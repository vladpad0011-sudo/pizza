<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход • Pizza</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>ADMIN</h1>
      <div class="sub">Користувачі • Піци • Замовлення</div>
    </div>
    <div class="actions">
      <a class="btn ghost" href="./index.html">⬅ На сайт</a>
      <button id="logoutBtn" class="btn ghost hidden">Вихід</button>
    </div>
  </header>

  <main class="container">

    <section id="loginBox" class="card">
      <div class="inner">
        <h2 style="margin:0 0 10px;">Вхід</h2>
        <div class="form">
          <input id="login" placeholder="Логін" value="" />
          <input id="pass" placeholder="Пароль" type="password" value="" />
          <button id="loginBtn" class="btn">Увійти</button>
          
        </div>
      </div>
    </section>

    <section id="panel" class="hidden" style="margin-top:14px;">
      <div class="grid">

        <div class="card">
          <div class="inner">
            <h2 style="margin:0 0 10px;">Піци</h2>

            <div class="form">
              <input id="pName" placeholder="Назва" />
              <input id="pDesc" placeholder="Опис" />
              <input id="pPrice" placeholder="Ціна 25см (грн)" type="number" />
              <input id="pImg" placeholder="Посилання на фото (або завантаж нижче)" />
              <input id="pFile" type="file" accept="image/*" />
              <button id="addPizzaBtn" class="btn">➕ Додати піцу</button>
            </div>

            <div id="itemsList" style="margin-top:12px;"></div>
          </div>
        </div>

        <div class="card">
          <div class="inner">
            <h2 style="margin:0 0 10px;">Замовлення</h2>
            <div class="sub">Автооновлення кожні 2 сек</div>
            <div id="ordersList" style="margin-top:10px;"></div>
          </div>
        </div>

        <div class="card">
          <div class="inner">
            <h2 style="margin:0 0 10px;">Користувачі / Паролі</h2>

            <h3 style="margin:10px 0;">Змінити пароль (свій)</h3>
            <div class="form">
              <input id="oldPass" type="password" placeholder="Старий пароль" />
              <input id="newPass" type="password" placeholder="Новий пароль" />
              <button id="changePassBtn" class="btn">Змінити пароль</button>
            </div>

            <h3 style="margin:14px 0 8px;">Додати нового користувача</h3>
            <div class="form">
              <input id="newUserLogin" placeholder="Логін нового користувача" />
              <input id="newUserPass" type="password" placeholder="Пароль нового користувача" />
              <select id="newUserRole">
                <option value="admin">admin</option>
                <option value="kitchen">kitchen</option>
                <option value="viewer">viewer</option>
              </select>
              <button id="addUserBtn" class="btn">➕ Додати користувача</button>
            </div>

            <div id="usersList" style="margin-top:12px;"></div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="./js/admin.js"></script>
</body>
</html>
